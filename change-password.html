<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambio de contraseña - TapeCloud</title>
  <link rel="icon" href="images/TapeCloud.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="Styles/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-container">
    <div class="auth-card auth-card-wide">
      <img class="auth-logo" src="images/TapeCloud.jpeg" alt="TapeCloud logo" />
      <div class="auth-copy">
        <h1>Actualiza tu contraseña</h1>
      </div>
      <form class="auth-form" action="portal.html" method="get">
        <div class="form-group">
          <label for="new-password">Nueva contraseña</label>
          <input id="new-password" type="password" placeholder="••••••••••••" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <input id="confirm-password" type="password" placeholder="••••••••••••" required />
        </div>
        <div class="strength-meter">
          <span>Fortaleza de contraseña</span>
          <div class="strength-track">
            <span class="strength-bar strength-medium"></span>
          </div>
        </div>
        <p class="form-note">Tu contraseña debe tener al menos 12 caracteres y combinar letras, números y símbolos.</p>
        <button type="submit" class="primary-button">Guardar y continuar</button>
      </form>
    </div>
  </main>
</body>
</html>
