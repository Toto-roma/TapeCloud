<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapeCloud</title>
  <link rel="icon" href="images/TapeCloud.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="Styles/styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="brand-block">
      <div class="brand-copy">
        <p class="eyebrow">TAPECLOUD</p>
        <h1>
            <img class="title-logo" src="images/TapeCloud.jpeg" alt="TapeCloud logo" />
        Reseñas de todo un poco 
        </h1>
      </div>
    </div>
  </header>

  <div class="split-screen">
    <section class="split-panel left-panel tapeflix-card">
      <div class="panel-content">
        <p class="eyebrow">TAPEFLIX</p>
        <h1>Películas y series</h1>
        <a class="image-button" href="tapeflix.html">
          <img class="panel-icon" src="images/TapeFlix.jpeg" alt="TapeFlix" />
        </a>
      </div>
    </section>

    <section class="split-panel right-panel">
      <div class="panel-content">
        <p class="eyebrow">TAPEBEAT</p>
        <h1>Explora la música</h1>
        <p>Accede a las aplicaciones cliente desde el hub central de autenticación y gestión de la plataforma.</p>
        <a class="split-button outline" href="tapebeat.html">Ir a TapeBeat</a>
      </div>
    </section>
  </div>

  <footer class="footer footer-split">
    <p>TapeCloud · Versión 1.0 · Junio 2026 </p>
  </footer>
</body>
</html>
