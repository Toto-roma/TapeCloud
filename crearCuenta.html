<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signin - TapeCloud</title>
  <link rel="icon" href="images/TapeCloud.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="Styles/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-container">
    <div class="auth-card">
      <img class="auth-logo" src="images/TapeCloud.jpeg" alt="TapeCloud logo" />
      <div class="auth-copy">
        <p class="eyebrow">registro de cuenta</p>
        <h1>Crear cuenta en TapeCloud</h1>

      <form class="auth-form" action="portal.html" method="get">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" placeholder="tu@empresa.com" required />
          <p class="error-text hidden">Este correo no está autorizado. Contacta al administrador.</p>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="••••••••••••" required />
          <p class="error-text hidden">Contraseña incorrecta. Revisa tus datos.</p>
        </div>
<div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <input id="confirm-password" type="password" placeholder="••••••••••••" required />
        </div>
      </form>

      <div class="strength-meter">
          <span>Fortaleza de contraseña</span>
          <div class="strength-track">
            <span class="strength-bar strength-medium"></span>
          </div>
        </div>
        <p class="form-note">Tu contraseña debe tener al menos 12 caracteres y combinar letras, números y símbolos.</p>
        <a class="primary-button small-button" href="index.html">Continuar</a>
      </form>
    </div>
    </div>
  </main>
</body>
</html>
